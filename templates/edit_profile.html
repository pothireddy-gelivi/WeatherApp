{% extends 'dummy.html' %}

{% block body_block %}

<style>
   

    .edit-container {
        max-width: 500px;
        margin: auto;
        margin-top: 60px;
        padding: 35px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        color: white;
    }

    .edit-title {
        text-align: center;
        font-size: 26px;
        font-weight: 600;
        margin-bottom: 25px;
    }

    .form-control {
        border-radius: 12px;
        border: none;
        padding: 10px;
        margin-bottom: 15px;
    }

    .form-control:focus {
        box-shadow: 0 0 8px rgba(255,255,255,0.8);
    }

    .btn-save {
        width: 100%;
        border-radius: 25px;
        padding: 10px;
        font-weight: 600;
        background: linear-gradient(90deg, #36d1dc, #5b86e5);
        border: none;
        color: white;
        transition: 0.3s;
    }

    .btn-save:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .preview-img {
        display: block;
        margin: 0 auto 20px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid white;
    }
</style>

<div class="edit-container">

    <div class="edit-title">✨ Edit Profile</div>

    <!-- Profile Preview -->
    {% if request.user.profile.profile_image %}
        <img src="{{ request.user.profile.profile_image.url }}" class="preview-img">
    {% else %}
        <img src="https://via.placeholder.com/120" class="preview-img">
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Address -->
        <label>Address</label>
        <input type="text" name="address" value="{{ form.address.value|default:'' }}" class="form-control">

        <!-- Profile Pic -->
        <label>Profile Picture</label>
        <input type="file" name="profile_image" >

        <button type="submit" class="btn btn-save mt-3">Save Changes</button>
    </form>

</div>

{% endblock %}
