{% extends 'dummy.html' %}

{% block title %}
<title>Login Page</title>
{% endblock %}

{% block body_block %}

<style>
    .login-container {
        max-width: 400px;
        margin: auto;
        padding: 30px;
        border-radius: 15px;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        margin-top: 50px;
    }

    .login-title {
        text-align: center;
        font-weight: 600;
        margin-bottom: 20px;
        color: #333;
    }

    .form-control {
        border-radius: 10px;
        padding: 10px;
        transition: 0.3s;
    }

    .form-control:focus {
        box-shadow: 0 0 10px rgba(91,134,229,0.5);
        border-color: #5b86e5;
    }

    .btn-login {
        width: 100%;
        border-radius: 25px;
        padding: 10px;
        background: linear-gradient(90deg, #36d1dc, #5b86e5);
        border: none;
        color: white;
        font-weight: 500;
        transition: 0.3s;
    }

    .btn-login:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .extra-links {
        text-align: center;
        margin-top: 15px;
    }

    .extra-links a {
        text-decoration: none;
        color: #5b86e5;
        font-weight: 500;
    }

    .extra-links a:hover {
        text-decoration: underline;
    }
</style>

<div class="login-container">
    <h2 class="login-title">🔐 Login to Your Account</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="un">Username</label>
            <input type="text" name="un" id="un" class="form-control" placeholder="Enter username" required>
        </div>

        <div class="form-group">
            <label for="pw">Password</label>
            <input type="password" name="pw" id="pw" class="form-control" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn btn-login">Login</button>
    </form>

    <div class="extra-links">
        <a href="{% url 'reset_password' %}">Forgot Password?</a>
    </div>
</div>

{% endblock %}
