{% extends 'dummy.html' %}

{% block title %}
<title>Profile Page</title>
{% endblock %}

{% block body_block %}

<style>
    .profile-container {
        max-width: 700px;
        margin: auto;
        margin-top: 40px;
        padding: 30px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        text-align: center;
    }

    .profile-pic {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #5b86e5;
        margin-bottom: 20px;
    }

    .profile-name {
        font-size: 24px;
        font-weight: 600;
        color: #333;
    }

    .profile-info {
        margin-top: 20px;
        text-align: left;
    }

    .info-box {
        background: #f8f9fa;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        font-size: 16px;
    }

    .label {
        font-weight: 600;
        color: #555;
    }

    .btn-edit {
        margin-top: 20px;
        border-radius: 25px;
        padding: 8px 20px;
        background: linear-gradient(90deg, #36d1dc, #5b86e5);
        border: none;
        color: white;
    }
</style>

<div class="profile-container">

    {% if PO.profile_image %}
        <img src="{{ PO.profile_image.url }}" class="profile-pic">
    {% else %}
        <img src="https://via.placeholder.com/150" class="profile-pic">
    {% endif %}

    <div class="profile-name">{{ UO.username }}</div>

    <div class="profile-info">
        <div class="info-box">
            <span class="label">📧 Email:</span> {{ UO.email }}
        </div>

        <div class="info-box">
            <span class="label">🏠 Address:</span> {{ PO.address }}
        </div>
    </div>

    <a href="{% url 'edit_profile' %}" class="btn btn-edit">Edit Profile</a>

</div>

{% endblock %}
