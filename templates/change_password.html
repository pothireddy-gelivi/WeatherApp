{% extends 'dummy.html' %}

{% block title %}
<title>Change Password</title>
{% endblock %}

{% block body_block %}

<style>
    .change-container {
        max-width: 420px;
        margin: auto;
        margin-top: 50px;
        padding: 30px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        text-align: center;
    }

    .title {
        font-weight: 600;
        margin-bottom: 20px;
        color: #333;
    }

    .form-control {
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 15px;
        transition: 0.3s;
    }

    .form-control:focus {
        box-shadow: 0 0 10px rgba(255,75,43,0.5);
        border-color: #ff4b2b;
    }

    .btn-change {
        width: 100%;
        border-radius: 25px;
        padding: 10px;
        background: linear-gradient(90deg, #ff416c, #ff4b2b);
        border: none;
        color: white;
        font-weight: 500;
        transition: 0.3s;
    }

    .btn-change:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .note {
        font-size: 13px;
        color: gray;
        margin-top: 10px;
    }
</style>

<div class="change-container">

    <h2 class="title">🔒 Change Your Password</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="password" name="password" class="form-control" placeholder="Enter new password" required>

        <button type="submit" class="btn btn-change">Update Password</button>
    </form>

    <div class="note">
        Use a strong password with letters, numbers & symbols 🔐
    </div>

</div>

{% endblock %}
