<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    {% block title %}
    <title>Weather App</title>
    {% endblock %}

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;

            /* Background Image */
            background: url('https://images.unsplash.com/photo-1608889175123-8ee362201f81') no-repeat center center/cover;
            background-color: #2c3e50;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Snow */
        .snow {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .snow span {
            position: absolute;
            top: -10px;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: snowFall linear infinite;
        }

        @keyframes snowFall {
            to {
                transform: translateY(100vh);
            }
        }

        /* Navbar */
        .custom-nav {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .nav-link {
            color: white !important;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #ffd700 !important;
        }

        .navbar-toggler {
            border-color: white;
        }

        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='white' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
        }

        /* Content above snow */
        nav, .hero, .main-container, .register-wrapper, 
        .login-container, .profile-container, 
        .search-container, .result-container, 
        .history-container {
            position: relative;
            z-index: 2;
        }
    </style>
</head>

<body>

<!-- ❄️ Snow -->
<div class="snow" id="snow"></div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg custom-nav">
    <a class="navbar-brand text-white font-weight-bold" href="#">🌤 WeatherApp</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

        <ul class="navbar-nav ml-auto">

            <li class="nav-item">
                <a href="{% url 'admin:index' %}" class="nav-link">Admin</a>
            </li>

            <li class="nav-item">
                <a href="{% url 'home' %}" class="nav-link">Home</a>
            </li>

            <li class="nav-item">
                <a href="{% url 'registration' %}" class="nav-link">Register</a>
            </li>

            <li class="nav-item">
                <a href="{% url 'all_history' %}" class="nav-link">All History</a>
            </li>

            {% if user.is_authenticated %}

            <li class="nav-item">
                <a href="{% url 'profile_display' %}" class="nav-link">Profile</a>
            </li>

            <li class="nav-item">
                <a href="{% url 'search' %}" class="nav-link">Search</a>
            </li>

            <li class="nav-item">
                <a href="{% url 'user_history' %}" class="nav-link">My History</a>
            </li>

            <li class="nav-item">
                <a href="{% url 'change_password' %}" class="nav-link">Change Password</a>
            </li>

            <li class="nav-item">
                <a href="{% url 'user_logout' %}" class="nav-link btn btn-light text-dark ml-2 px-3">Logout</a>
            </li>

            {% else %}

            <li class="nav-item">
                <a href="{% url 'user_login' %}" class="nav-link btn btn-success text-dark ml-2 px-3">Login</a>
            </li>

            {% endif %}

        </ul>

    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-4">
    {% block body_block %}
    {% endblock %}
</div>

<!-- Snow Script -->
<script>
const snowContainer = document.getElementById("snow");

for (let i = 0; i < 80; i++) {
    let snow = document.createElement("span");
    snow.style.left = Math.random() * 100 + "vw";
    snow.style.animationDuration = (3 + Math.random() * 5) + "s";
    snow.style.opacity = Math.random();
    snowContainer.appendChild(snow);
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
