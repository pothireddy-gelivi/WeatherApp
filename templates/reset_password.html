{% extends 'dummy.html' %}

{% block title %}
<title>Reset Password</title>
{% endblock %}

{% block body_block %}

<style>
    .reset-container {
        max-width: 400px;
        margin: auto;
        margin-top: 50px;
        padding: 30px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        text-align: center;
    }

    .title {
        font-weight: 600;
        margin-bottom: 20px;
        color: #333;
    }

    .form-control {
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 15px;
        transition: 0.3s;
    }

    .form-control:focus {
        box-shadow: 0 0 10px rgba(255,126,95,0.5);
        border-color: #ff7e5f;
    }

    .btn-reset {
        width: 100%;
        border-radius: 25px;
        padding: 10px;
        background: linear-gradient(90deg, #ff7e5f, #feb47b);
        border: none;
        color: white;
        font-weight: 500;
        transition: 0.3s;
    }

    .btn-reset:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .note {
        font-size: 13px;
        color: gray;
        margin-top: 10px;
    }
</style>

<div class="reset-container">

    <h2 class="title">🔐 Reset Your Password</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="un" class="form-control" placeholder="Enter username" required>

        <input type="password" name="pw" class="form-control" placeholder="Enter new password" required>

        <button type="submit" class="btn btn-reset">Reset Password</button>
    </form>

    <div class="note">
        Make sure your new password is strong 🔒
    </div>

</div>

{% endblock %}
