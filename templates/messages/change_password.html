{% extends 'dummy.html' %}

{% block title %}
<title>Change Password</title>
{% endblock %}

{% block body_block %}

<style>
    .success-box {
        max-width: 500px;
        margin: 60px auto;
        padding: 25px 30px;
        border-radius: 15px;
        background: linear-gradient(135deg, #00c9a7, #92fe9d);
        color: #033;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        animation: fadeIn 0.6s ease-in-out;
    }

    .success-icon {
        font-size: 50px;
        margin-bottom: 10px;
    }

    .success-text {
        font-size: 20px;
        font-weight: 600;
    }

    .success-sub {
        font-size: 14px;
        margin-top: 8px;
        color: #044;
    }

    .btn-home {
        margin-top: 20px;
        border-radius: 25px;
        padding: 8px 20px;
        border: none;
        background: #033;
        color: white;
        transition: 0.3s;
    }

    .btn-home:hover {
        background: black;
        transform: scale(1.05);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<div class="success-box">
    <div class="success-icon">✅</div>
    <div class="success-text">Password Changed Successfully!</div>
    <div class="success-sub">Your account is now secure 🔒</div>

    <a href="{% url 'home' %}">
        <button class="btn-home">Go to Home</button>
    </a>
</div>

{% endblock %}
