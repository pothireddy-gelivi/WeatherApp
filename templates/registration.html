{% block title %} <title>Registration Page</title> {% endblock %} {% block body_block %} <style>
    .register-container {
        max-width: 600px;
        margin: auto;
        padding: 35px;
        border-radius: 15px;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        margin-top: 40px;
    }

    .register-title {
        text-align: center;
        font-weight: 600;
        margin-bottom: 25px;
        color: #333;
    }

    .form-control {
        border-radius: 10px;
        padding: 10px;
        transition: 0.3s;
    }

    .form-control:focus {
        box-shadow: 0 0 10px rgba(91, 134, 229, 0.5);
        border-color: #5b86e5;
    }

    .btn-register {
        width: 100%;
        border-radius: 25px;
        padding: 10px;
        background: linear-gradient(90deg, #ff7e5f, #feb47b);
        border: none;
        color: white;
        font-weight: 500;
        transition: 0.3s;
    }

    .btn-register:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .extra-links {
        text-align: center;
        margin-top: 15px;
    }

    .extra-links a {
        text-decoration: none;
        color: #ff7e5f;
        font-weight: 500;
    }

    .extra-links a:hover {
        text-decoration: underline;
    }
</style>
<div class="register-container">
    <h2 class="register-title">📝 Create Your Account</h2>
    <form method="POST" enctype="multipart/form-data"> {% csrf_token %} <!-- User Form -->
        <div class="mb-3"> {{ uf.as_p }} </div> <!-- Profile Form -->
        <div class="mb-3"> {{ pf.as_p }} </div> 
        <button type="submit" class="btn btn-register">Register</button>
    </form>
    <div class="extra-links">
        <p>Already have an account? <a href="{% url 'user_login' %}">Login here</a> </p>
    </div>
</div> {% endblock %}
